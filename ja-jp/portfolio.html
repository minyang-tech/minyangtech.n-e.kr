    <style>
        :root { --accent: #007bff; --txt: #333; --bg: #fff; --brd: #eee; --card-bg: #fff; }
        body.dark-mode { --txt: #f5f5f5; --bg: #121212; --brd: #333; --card-bg: #1e1e1e; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--txt);
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
        }

        header {
            width: 100%;
            height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            border-bottom: 1px solid var(--brd);
            background-color: var(--bg);
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
            box-sizing: border-box;
        }
        .header-left { display: flex; align-items: center; gap: 40px; }
        .logo-link img { height: 40px !important; width: auto !important; display: block; }
        .nav-links { display: flex; list-style: none; gap: 25px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--txt); font-weight: 600; opacity: 0.7; transition: 0.2s; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }
        .nav-links a.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }

        .post-author { display: inline-flex; align-items: center; gap: 12px; margin: 15px 0 25px; padding: 8px 12px; border-radius: 12px; transition: 0.2s; }
        .post-author.clickable { cursor: pointer; }
        .post-author.clickable:hover { background: rgba(0, 123, 255, 0.05); }
        .post-author.clickable:hover .author-name { color: var(--accent); text-decoration: underline; }
        .author-img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #eee; border: 1px solid var(--brd); }
        .author-name { font-weight: 700; font-size: 0.95rem; }

        .post-media-container {
            width: 100%;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 24px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .post-hero-img { width: 100%; height: 450px; background-size: cover; background-position: center; }
        .post-video, .post-embed { width: 100%; aspect-ratio: 16 / 9; display: block; border: none; }
        .asset-list { display: flex; flex-direction: column; gap: 16px; margin: 28px 0 36px; }
        .asset-file {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 16px 18px;
            border: 1px solid var(--brd);
            border-radius: 12px;
            background: var(--card-bg);
            font-weight: 600;
        }
        .asset-file i { color: var(--accent); font-size: 1.1rem; }
        .asset-file small { display: block; opacity: 0.6; font-weight: 500; margin-top: 2px; }

        .filter-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            gap: 15px;
            flex-wrap: wrap;
        }
        .search-box { position: relative; flex: 1; min-width: 250px; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; }
        .search-box input {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border-radius: 12px;
            border: 1px solid var(--brd);
            background: var(--card-bg);
            color: var(--txt);
            font-size: 0.95rem;
            outline: none;
            transition: 0.2s;
            box-sizing: border-box;
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        .sort-select {
            padding: 12px 15px;
            border-radius: 12px;
            border: 1px solid var(--brd);
            background: var(--card-bg);
            color: var(--txt);
            outline: none;
            cursor: pointer;
            font-weight: 600;
        }

        .news-container {
            max-width: 1000px;
            margin: 0 auto;
            min-height: calc(100vh - 160px);
            padding: 130px 20px 60px;
        }
        .news-header { text-align: center; margin-bottom: 40px; }
        .news-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        .news-list { display: flex; flex-direction: column; gap: 30px; }
        .author-group { display: flex; flex-direction: column; gap: 18px; }
        .author-group + .author-group { margin-top: 18px; }
        .author-group-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding-bottom: 14px;
            border-bottom: 1px solid var(--brd);
        }
        .author-group-header img {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--brd);
            background: #eee;
        }
        .author-group-name { font-size: 1.15rem; font-weight: 800; }
        .author-group-link { font-size: 0.85rem; opacity: 0.6; margin-top: 2px; }
        .author-group-items { display: flex; flex-direction: column; gap: 30px; }
        .news-card {
            display: flex;
            background: var(--card-bg);
            border: 1px solid var(--brd);
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }
        .news-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-color: var(--accent); }
        .news-img { width: 300px; min-width: 300px; height: 200px; background-size: cover; background-position: center; }
        .news-info { padding: 30px; flex: 1; display: flex; flex-direction: column; }
        .news-date { font-size: 0.85rem; color: var(--accent); font-weight: 600; margin-bottom: 10px; }
        .news-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 15px; }
        .news-excerpt { font-size: 0.95rem; opacity: 0.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.6; }

        #post-view { display: none; }
        .post-back { display: inline-block; margin-bottom: 25px; text-decoration: none; color: var(--accent); font-weight: 600; cursor: pointer; }
        .post-full-title { font-size: 2.5rem; font-weight: 800; }
        .post-content { font-size: 1.1rem; line-height: 1.8; color: var(--txt); }
        .post-content h1, .post-content h2, .post-content h3 { margin-top: 30px; color: var(--accent); }
        .post-content img { max-width: 100%; height: auto; border-radius: 12px; margin: 25px 0; display: block; }
        .post-content video, .post-content iframe { max-width: 100%; }
        .post-content blockquote { border-left: 4px solid var(--accent); padding-left: 20px; opacity: 0.8; font-style: italic; margin: 20px 0; }

        footer {
            width: 100%;
            padding: 50px 20px;
            border-top: 1px solid var(--brd);
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            box-sizing: border-box;
        }
        .x-logo-img { height: 24px !important; filter: invert(1); transition: 0.3s; }
        body.dark-mode .x-logo-img { filter: invert(0); }
        .fa-youtube { font-size: 32px !important; color: #FF0000 !important; }

        .switch { width: 44px; height: 22px; position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        @media (max-width: 768px) {
            .news-card { flex-direction: column; }
            .news-img { width: 100%; min-width: 0; height: 180px; }
            .filter-container { flex-direction: column; align-items: stretch; }
            .post-hero-img { height: 250px; }
            .post-full-title { font-size: 1.8rem; }
        }
    </style>
</head>

    <script>
        const defaultAvatar = 'https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/%EB%AF%BC%EC%96%91%20%ED%85%8C%ED%81%AC.png';
        const placeholderCover = 'image/%EB%AF%BC%EC%96%91%ED%85%8C%ED%81%AC%20%EB%B0%94%ED%83%95%ED%99%94%EB%A9%B4.png';
        let portfolioData = [];
        const toggle = document.getElementById('dark-mode-toggle');
        const searchInput = document.getElementById('portfolio-search');
        const sortSelect = document.getElementById('portfolio-sort');

        function updateTheme(isDark) {
            document.body.classList.toggle('dark-mode', isDark);
            toggle.checked = isDark;
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        }
        toggle.addEventListener('change', () => updateTheme(toggle.checked));

        async function fetchPortfolio() {
            try {
                portfolioData = await SiteSecurity.secureFetchJson('/portfolio.json', '5fa0b8325283b7a209278f3f8b1879a8a9f4db8a6c19fd043815fe3f58602b36');
                checkUrlParam();
            } catch (error) {
                console.error('Load Error:', error);
                SiteSecurity.appendTextMessage(document.getElementById('portfolio-feed'), '데이터를 불러올 수 없습니다.');
            }
        }

        function renderYoutube(url) {
            const match = url.match(/(?:youtube\.com\/(?:[^\/]+\/.+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/)([^\"&?\/\s]{11})/);
            return match ? `https://www.youtube.com/embed/${match[1]}` : '';
        }

        function hasValue(value) {
            return value !== undefined && value !== null && String(value).trim() !== '' && String(value).trim() !== '--';
        }

        function renderAsset(asset) {
            if (!asset || !hasValue(asset.type) || !hasValue(asset.src)) return null;
            const src = SiteSecurity.safeUrl(asset.src);
            if (!src) return null;
            if (asset.type === 'image') {
                const container = document.createElement('div');
                container.className = 'post-media-container';
                const image = document.createElement('div');
                image.className = 'post-hero-img';
                image.style.backgroundImage = `url("${src}")`;
                container.appendChild(image);
                return container;
            }
            if (asset.type === 'video') {
                const container = document.createElement('div');
                container.className = 'post-media-container';
                const youtubeUrl = renderYoutube(src);
                if (youtubeUrl) {
                    const iframe = document.createElement('iframe');
                    iframe.className = 'post-video';
                    iframe.src = youtubeUrl;
                    iframe.allowFullscreen = true;
                    container.appendChild(iframe);
                    return container;
                }
                const video = document.createElement('video');
                video.className = 'post-video';
                video.controls = true;
                const poster = SiteSecurity.safeUrl(asset.poster);
                if (poster) video.poster = poster;
                const source = document.createElement('source');
                source.src = src;
                video.appendChild(source);
                container.appendChild(video);
                return container;
            }
            if (asset.type === 'embed') {
                const container = document.createElement('div');
                container.className = 'post-media-container';
                const iframe = document.createElement('iframe');
                iframe.className = 'post-embed';
                iframe.src = src;
                iframe.loading = 'lazy';
                iframe.allowFullscreen = true;
                container.appendChild(iframe);
                return container;
            }
            if (asset.type === 'file') {
                const link = document.createElement('a');
                link.className = 'asset-file';
                link.href = src;
                link.target = '_blank';
                link.rel = 'noopener';
                const icon = document.createElement('i');
                icon.className = 'fa-solid fa-paperclip';
                const text = document.createElement('span');
                text.textContent = hasValue(asset.title) ? asset.title : src.split('/').pop();
                const small = document.createElement('small');
                small.textContent = hasValue(asset.description) ? asset.description : '파일 열기';
                text.appendChild(small);
                link.append(icon, text);
                return link;
            }
            return null;
        }

        function renderAssets(assets = []) {
            const validAssets = assets.filter(asset => hasValue(asset?.type) && hasValue(asset?.src));
            const nodes = validAssets.filter(asset => asset.type !== 'file').map(renderAsset).filter(Boolean);
            const files = validAssets.filter(asset => asset.type === 'file').map(renderAsset).filter(Boolean);
            if (files.length) {
                const list = document.createElement('div');
                list.className = 'asset-list';
                list.append(...files);
                nodes.push(list);
            }
            return nodes;
        }

        function goToAuthor(url) {
            const safeUrl = SiteSecurity.safeUrl(url);
            if (safeUrl) window.open(safeUrl, '_blank', 'noopener');
        }

        function showPost(id) {
            const post = portfolioData.find(item => item.id == id);
            if (!post) return;

            document.getElementById('list-ui').style.display = 'none';
            document.getElementById('post-view').style.display = 'block';
            window.scrollTo(0, 0);

            const hasLink = hasValue(post.author_link) && post.author_link !== '#';
            const authorClass = hasLink ? 'post-author clickable' : 'post-author';
            const body = document.getElementById('post-body');
            body.replaceChildren();
            const date = document.createElement('div');
            date.className = 'news-date';
            date.textContent = post.date || '';
            const titleRow = document.createElement('div');
            titleRow.style.cssText = 'display:flex; align-items:center; justify-content:space-between; gap:20px; margin-bottom:15px;';
            const title = document.createElement('h1');
            title.className = 'post-full-title';
            title.style.margin = '0';
            title.textContent = post.title_ko || '';
            const share = document.createElement('button');
            share.type = 'button';
            share.style.cssText = 'border:none; background:var(--accent); color:#fff; padding:10px 14px; border-radius:10px; cursor:pointer; font-weight:600;';
            share.addEventListener('click', sharePost);
            const icon = document.createElement('i');
            icon.className = 'fa-solid fa-share';
            share.appendChild(icon);
            titleRow.append(title, share);
            const author = document.createElement('div');
            author.className = authorClass;
            if (hasLink) author.addEventListener('click', () => goToAuthor(post.author_link));
            const authorImg = document.createElement('img');
            authorImg.className = 'author-img';
            authorImg.alt = 'Author';
            authorImg.src = SiteSecurity.safeUrl(hasValue(post.author_img) ? post.author_img : defaultAvatar);
            const authorName = document.createElement('span');
            authorName.className = 'author-name';
            authorName.textContent = hasValue(post.author_name) ? post.author_name : '민양테크';
            author.append(authorImg, authorName);
            const content = document.createElement('div');
            content.className = 'post-content';
            SiteSecurity.setMarkdown(content, post.content_ko || '');
            body.append(date, titleRow, author, ...renderAssets(post.assets), content);

            if (!window.location.search.includes(`id=${id}`)) history.pushState(null, '', `?id=${id}`);
        }

        function applyFilterAndSort() {
            const searchTerm = searchInput.value.toLowerCase();
            const sortOrder = sortSelect.value;
            const filtered = portfolioData.filter(item =>
                (item.title_ko || '').toLowerCase().includes(searchTerm) ||
                (item.content_ko || '').toLowerCase().includes(searchTerm)
            );

            filtered.sort((a, b) => sortOrder === 'newest' ? b.id - a.id : a.id - b.id);
            renderPortfolio(filtered);
        }

        function renderPortfolio(data) {
            const feed = document.getElementById('portfolio-feed');
            feed.replaceChildren();
            if (!data.length) {
                SiteSecurity.appendTextMessage(feed, '등록된 포트폴리오가 없습니다.');
                return;
            }

            const grouped = data.reduce((groups, item) => {
                const key = hasValue(item.author_link) ? item.author_link : (hasValue(item.author_name) ? item.author_name : 'unknown');
                if (!groups.has(key)) groups.set(key, []);
                groups.get(key).push(item);
                return groups;
            }, new Map());

            grouped.forEach(items => {
                const author = items[0];
                const group = document.createElement('section');
                group.className = 'author-group';
                const header = document.createElement('div');
                header.className = 'author-group-header';
                const authorImg = document.createElement('img');
                authorImg.src = SiteSecurity.safeUrl(hasValue(author.author_img) ? author.author_img : defaultAvatar);
                const meta = document.createElement('div');
                const name = document.createElement('div');
                name.className = 'author-group-name';
                name.textContent = hasValue(author.author_name) ? author.author_name : '민양테크';
                const link = document.createElement('div');
                link.className = 'author-group-link';
                link.textContent = hasValue(author.author_link) ? author.author_link : '';
                meta.append(name, link);
                header.append(authorImg, meta);
                const itemContainer = document.createElement('div');
                itemContainer.className = 'author-group-items';
                group.append(header, itemContainer);
                items.forEach(item => {
                const tempDiv = document.createElement('div');
                SiteSecurity.setMarkdown(tempDiv, item.content_ko || '');
                const plainText = tempDiv.textContent || '';
                const imageAsset = item.assets?.find(asset => asset.type === 'image' && hasValue(asset.src));
                const cover = hasValue(item.cover) ? item.cover : (imageAsset?.src || placeholderCover);

                    const card = document.createElement('div');
                    card.className = 'news-card';
                    card.addEventListener('click', () => showPost(item.id));
                    const image = document.createElement('div');
                    image.className = 'news-img';
                    image.style.backgroundImage = `url("${SiteSecurity.safeUrl(cover)}")`;
                    const info = document.createElement('div');
                    info.className = 'news-info';
                    const date = document.createElement('span');
                    date.className = 'news-date';
                    date.textContent = item.date || '';
                    const title = document.createElement('h2');
                    title.className = 'news-title';
                    title.style.margin = '10px 0';
                    title.textContent = item.title_ko || '';
                    const excerpt = document.createElement('p');
                    excerpt.className = 'news-excerpt';
                    excerpt.textContent = `${plainText.substring(0, 140)}${plainText.length > 140 ? '...' : ''}`;
                    info.append(date, title, excerpt);
                    card.append(image, info);
                    itemContainer.appendChild(card);
                });

                feed.appendChild(group);
            });
        }

        function checkUrlParam() {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('id');
            postId ? showPost(postId) : showList();
        }

        function showList() {
            document.getElementById('list-ui').style.display = 'block';
            document.getElementById('post-view').style.display = 'none';
            window.scrollTo(0, 0);
            applyFilterAndSort();
        }

        function closePost() {
            history.pushState(null, '', window.location.pathname);
            showList();
        }

        function sharePost() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: document.title, text: '민양테크 포트폴리오', url });
            } else {
                navigator.clipboard.writeText(url);
                alert('링크가 복사되었습니다.');
            }
        }

        searchInput.addEventListener('input', applyFilterAndSort);
        sortSelect.addEventListener('change', applyFilterAndSort);
        window.onpopstate = () => checkUrlParam();

        window.onload = () => {
            if (localStorage.getItem('darkMode') === 'enabled') updateTheme(true);
            fetchPortfolio();
        };
    </script>
    <script src="/assets/js/translation-menu.js" defer></script>
</body>
</html>
