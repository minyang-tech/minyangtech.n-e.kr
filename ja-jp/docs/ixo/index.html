    <style>
        /* --- 변수 및 기본 스타일 통일 --- */
        :root { --accent: #007bff; --txt: #333; --bg: #fff; --brd: #eee; --card-bg: #fff; }
        body.dark-mode { --txt: #f5f5f5; --bg: #121212; --brd: #333; --card-bg: #1e1e1e; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg); color: var(--txt);
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
        }

        /* --- 헤더 --- */
        header {
            width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; border-bottom: 1px solid var(--brd);
            background-color: var(--bg); position: fixed; top: 0; left: 0; z-index: 1000;
            box-sizing: border-box;
        }
        .header-left { display: flex; align-items: center; gap: 40px; }
        .logo-link img { height: 40px !important; width: auto !important; display: block; }

        .nav-links { display: flex; list-style: none; gap: 25px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--txt); font-weight: 600; opacity: 0.7; transition: 0.2s; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }
        .nav-links a.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* --- Docs Layout --- */
        .docs-container { display: flex; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - 160px); padding-top: 80px; }

        /* --- Sidebar Style --- */
        .docs-sidebar { width: 280px; padding: 40px 20px; border-right: 1px solid var(--brd); position: sticky; top: 80px; height: fit-content; }
        .docs-sidebar ul { list-style: none !important; padding: 0 !important; margin: 0 !important; }
        .docs-sidebar li { margin-bottom: 8px !important; list-style: none !important; }
        .docs-sidebar a { text-decoration: none; color: var(--txt); opacity: 0.6; transition: 0.3s; font-size: 0.95rem; display: block; }
        .docs-sidebar a:hover, .docs-sidebar a.active { opacity: 1; font-weight: bold; color: var(--accent); }

        /* --- Main Content --- */
        .docs-content { flex: 1; padding: 40px 60px; line-height: 1.8; }
        .docs-content h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; }
        .docs-content .subtitle { font-size: 1.2rem; opacity: 0.6; margin-bottom: 30px; letter-spacing: 1px; }

        /* 정보 스타일링 */
        .docs-body h2 { font-size: 1.8rem; margin-top: 40px; border-bottom: 2px solid var(--brd); padding-bottom: 10px; }
        .info-list { list-style: none; padding: 0; margin: 20px 0; }
        .info-list li { margin-bottom: 12px; display: flex; align-items: center; }
        .info-list li strong { min-width: 120px; color: var(--accent); font-weight: 700; }
        .reference-content h1 { font-size: 2rem; margin-top: 42px; }
        .reference-content h2 { font-size: 1.5rem; margin-top: 32px; }
        .reference-content table { width: 100%; border-collapse: collapse; margin: 18px 0 28px; font-size: 0.95rem; }
        .reference-content th, .reference-content td { padding: 12px 14px; border-bottom: 1px solid var(--brd); text-align: left; vertical-align: top; }
        .reference-content th { background: rgba(62, 207, 142, 0.05); color: var(--accent); font-weight: 700; }
        .reference-content code { background: rgba(0, 123, 255, 0.08); padding: 2px 6px; border-radius: 6px; }
        .reference-content hr { border: 0; border-top: 1px solid var(--brd); margin: 34px 0; }

        .status-badge {
            display: inline-block;
            background: rgba(62, 207, 142, 0.1);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-top: 20px;
        }

        /* --- Footer --- */
        footer {
            padding: 60px 20px 40px; text-align: center;
            border-top: 1px solid var(--brd); background-color: var(--bg);
        }
        .footer-sns { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; align-items: center; }
        .x-logo-img { height: 24px !important; width: auto !important; filter: invert(1); transition: 0.3s; }
        body.dark-mode .x-logo-img { filter: invert(0); }
        .fa-youtube { font-size: 32px !important; color: #FF0000 !important; }

        .footer-email { margin-bottom: 15px; }
        .footer-email a { text-decoration: none; color: var(--txt); opacity: 0.6; font-weight: 500; }
        .footer-copyright { font-size: 0.85rem; opacity: 0.4; }

        /* 다크모드 스위치 */
        .switch { width: 44px; height: 22px; position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        @media (max-width: 900px) {
            .docs-container { flex-direction: column; }
            .docs-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--brd); position: relative; top: 0; }
            .docs-content { padding: 40px 20px; }
        }

    <script>
        async function loadSidebar() {
            const target = document.getElementById('sidebar-target');
            try {
                // 현재 폴더 구조에 따라 nav.html 경로 탐색
                const data = await SiteSecurity.secureFetchText('../nav.html', 'a3deec66adba1155ea9f122bb6a942d3fcbb481ffddee2903afd2747fc80d3c2');
                SiteSecurity.setSanitizedHtml(target, data);

                const links = target.querySelectorAll('a');
                const currentPath = window.location.pathname;

                links.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && (currentPath.endsWith(href) || currentPath.includes(href))) {
                        link.classList.add('active');
                    }
                });
            } catch (error) {
                SiteSecurity.appendTextMessage(target, 'ドキュメントを読み込めませんでした。');
            }
        }

        async function loadMainReference() {
            const target = document.getElementById('main-reference-target');
            try {
                const markdown = await SiteSecurity.secureFetchText('main.md', 'c1caa66207ca4292a11bb59d8e1f20f7fc02dafc8a55b6ec8130793a02e78c5a');
                SiteSecurity.setMarkdown(target, markdown);
            } catch (error) {
                SiteSecurity.appendTextMessage(target, 'ドキュメントを読み込めませんでした。');
            }
        }

        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        }

        document.getElementById('dark-mode-toggle').addEventListener('change', toggleDarkMode);

        window.onload = () => {
            loadSidebar();
            loadMainReference();
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.body.classList.add('dark-mode');
                const toggle = document.getElementById('dark-mode-toggle');
                if (toggle) toggle.checked = true;
            }
        };
    </script>
    <script src="/assets/js/translation-menu.js" defer></script>
