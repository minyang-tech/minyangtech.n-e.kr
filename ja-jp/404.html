    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/css/header-unified.css">

    <style>
        /* 기본 변수 설정 (Light Mode) */
        :root {
            --accent: #007bff;
            --txt: #333;
            --bg: #fff;
            --brd: #eee;
        }

        /* 다크모드 변수 설정 - body.dark-mode로 우선순위 강화 */
        body.dark-mode {
            --txt: #f5f5f5;
            --bg: #121212;
            --brd: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box !important; }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            color: var(--txt);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            /* 배경색과 글자색 변화를 부드럽게 애니메이션화 */
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* --- 헤더 --- */
        header {
            width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; border-bottom: 1px solid var(--brd);
            background-color: var(--bg);
            transition: background-color 0.3s, border-color 0.3s;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo-link img { height: 40px !important; width: auto !important; display: block; }
        .nav-links { display: flex; list-style: none; gap: 20px; margin-left: 20px; }
        .nav-links a { text-decoration: none; color: var(--txt); font-weight: 600; opacity: 0.8; }
        .nav-links a:hover { color: var(--accent); opacity: 1; }

        .controls { display: flex; align-items: center; }

        /* 다크모드 스위치 */
        .switch { width: 44px; height: 22px; position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        /* --- 메인 콘텐츠 --- */
        main { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 40px 20px; }
        .img-404 { width: 280px; height: auto; }
        .img-mascot { width: 150px; height: auto; margin-top: -45px; z-index: 2; }
        .home-btn { background: var(--accent); color: #fff !important; padding: 15px 45px; border-radius: 50px; text-decoration: none; font-weight: 700; margin-top: 20px; display: inline-block; transition: 0.2s; }
        .home-btn:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,123,255,0.3); }

        /* --- 푸터 영역 --- */
        footer {
            width: 100%;
            padding: 50px 20px;
            border-top: 1px solid var(--brd);
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            transition: background-color 0.3s, border-color 0.3s;
        }

        footer h3 { margin-bottom: 20px; font-size: 1.2rem; }
        .footer-sns { display: flex; justify-content: center; align-items: center; gap: 30px; margin-bottom: 25px; width: 100%; }
        .footer-sns a { display: flex; align-items: center; justify-content: center; transition: 0.2s; }

        /* X 로고 필터 처리 */
        .x-logo-img { height: 24px !important; width: auto !important; display: block; filter: invert(1); transition: filter 0.3s; }
        body.dark-mode .x-logo-img { filter: invert(0); }

        .fa-youtube { font-size: 32px !important; color: #FF0000 !important; }

        .footer-email { margin-bottom: 15px; }
        .footer-email a { text-decoration: none; color: var(--txt); opacity: 0.6; font-size: 14px; }
        .footer-copyright { font-size: 13px; opacity: 0.4; line-height: 1.6; }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://minyangtech.n-e.kr" class="logo-link">
                <img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/%EB%AF%BC%EC%96%91%20%ED%85%8C%ED%81%AC.png" alt="Logo">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="/ja-jp/docs/index.html" class="active">ドキュメント</a></li>
                    <li><a href="/ja-jp/news/index.html">ニュース</a></li>
                    <li><a href="/ja-jp/apps.html">アプリ</a></li>
                    <li><a href="/ja-jp/portfolio.html">ポートフォリオ</a></li>
                    <li><a href="/ja-jp/issues.html">課題</a></li>
                    <li><a href="/ja-jp/Contributing.html">Contributing</a></li>
                    <li><a href="/ja-jp/eula.html">EULA</a></li>
                </ul>
            </nav>
        </div>
        <div class="controls">
            <label class="switch">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <main>
        <div class="error-imgs">
            <img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/404.png" class="img-404" alt="404">
            <img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/%EB%AF%BC%EC%96%91%20%EB%A7%88%EC%8A%A4%EC%BD%94%ED%8A%B8%20%EC%BA%90%EB%A6%AD%ED%84%B0.png" class="img-mascot" alt="Mascot">
        </div>
        <p class="error-msg" style="font-size: 20px; font-weight: bold; margin: 20px 0;">요청하신 페이지를 찾을 수 없습니다.</p>
        <a href="https://minyangtech.n-e.kr" class="home-btn">홈으로 돌아가기</a>
    </main>

    <footer>
        <h3>Connect with Us</h3>
        <div class="footer-sns">
            <a href="https://x.com/minyangtech" target="_blank">
                <img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/logo-white.png" class="x-logo-img" alt="X">
            </a>
            <a href="https://www.youtube.com/@minyangtech" target="_blank">
                <i class="fa-brands fa-youtube"></i>
            </a>
        </div>
        <div class="footer-email">
            <a href="mailto:support@minyangtech.n-e.kr">support@minyangtech.n-e.kr</a>
        </div>
        <div class="footer-copyright">
            <p>Copyright 2026. MinyangTech. All rights reserved.</p>
        </div>
    </footer>

    <script>
        const toggle = document.getElementById('dark-mode-toggle');

        // 다크모드 전환 함수
        function updateTheme(isDark) {
            if (isDark) {
                document.body.classList.add('dark-mode');
                toggle.checked = true;
                localStorage.setItem('darkMode', 'enabled');
            } else {
                document.body.classList.remove('dark-mode');
                toggle.checked = false;
                localStorage.setItem('darkMode', 'disabled');
            }
        }

        // 스위치 클릭 이벤트
        toggle.addEventListener('change', () => {
            updateTheme(toggle.checked);
        });

        // 페이지 로드 시 상태 복원
        window.addEventListener('DOMContentLoaded', () => {
            const savedMode = localStorage.getItem('darkMode');
            // 저장된 설정이 'enabled'이거나, 설정은 없지만 시스템이 다크모드인 경우
            if (savedMode === 'enabled' || (!savedMode && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                updateTheme(true);
            }
        });
    </script>
    <script src="/assets/js/translation-menu.js" defer></script>
</body>
</html>
