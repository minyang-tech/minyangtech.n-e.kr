<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>민양테크 | 민양테크 Docs</title>

    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --accent: #007bff; --txt: #333; --bg: #fff; --brd: #eee; --card-bg: #fff; }
        body.dark-mode { --txt: #f5f5f5; --bg: #121212; --brd: #333; --card-bg: #1e1e1e; }

        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg); color: var(--txt); 
            transition: background-color 0.3s, color 0.3s;
            margin: 0;
        }

        /* --- Unified Header Rules 적용 --- */
        header {
            width: 100%;
            min-height: 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            box-sizing: border-box;
            position: fixed; /* Docs 페이지 특성상 상단 고정 */
            top: 0;
            left: 0;
            z-index: 1000;
            background-color: var(--bg);
            border-bottom: 1px solid var(--brd);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 28px;
            min-width: 0;
        }

        .logo-link img {
            height: 40px !important;
            width: auto !important;
            display: block;
        }

        .nav-links {
            display: flex !important;
            list-style: none;
            align-items: center;
            gap: 22px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--txt);
            font-weight: 600;
            opacity: 0.7;
            transition: 0.2s;
            line-height: 1.2 !important;
            white-space: nowrap;
        }

        .nav-links a:hover { opacity: 1; color: var(--accent); }
        .nav-links a.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }

        .controls {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-shrink: 0;
        }

        /* --- 모바일 대응 (header-unified.css 스타일) --- */
        @media (max-width: 850px) {
            header {
                min-height: 72px;
                padding: 0 4%; /* 상하 패딩 제거하여 높이 유지 */
                gap: 10px;
            }

            .header-left {
                gap: 12px;
                flex: 1 1 auto;
                min-width: 0; /* 넘침 방지 */
            }

            header nav {
                min-width: 0;
                flex: 1 1 auto;
                overflow: hidden; /* 스크롤 영역 제한 */
            }

            header .nav-links {
                display: flex !important;
                flex-wrap: nowrap;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                gap: 12px;
                padding-bottom: 2px;
            }

            /* 가로 스크롤바 숨기기 (선택 사항) */
            header .nav-links::-webkit-scrollbar { display: none; }

            header .nav-links li {
                flex: 0 0 auto;
            }

            header .nav-links a {
                font-size: 14px !important;
            }
        }

        /* --- Layout --- */
        .docs-container { display: flex; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - 160px); padding-top: 80px; }
        .docs-sidebar { width: 280px; padding: 40px 20px; border-right: 1px solid var(--brd); position: sticky; top: 80px; height: fit-content; }
        .docs-sidebar ul { list-style: none; padding: 0; margin: 0; }
        .docs-sidebar a { text-decoration: none; color: var(--txt); opacity: 0.6; transition: 0.3s; font-size: 0.95rem; display: block; padding: 8px 0; }
        .docs-sidebar a:hover, .docs-sidebar a.active { opacity: 1; font-weight: bold; color: var(--accent); }

        .docs-content { flex: 1; padding: 40px 60px; line-height: 1.8; }
        .docs-content h1 { font-size: 2.5rem; margin: 0 0 10px 0; font-weight: 800; }
        .docs-content .subtitle { font-size: 1.2rem; opacity: 0.6; margin-bottom: 30px; }

        @media (max-width: 900px) {
            .docs-container { flex-direction: column; padding-top: 72px; }
            .docs-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--brd); position: relative; top: 0; padding: 20px; }
            .docs-content { padding: 40px 20px; }
        }

        /* Dark Mode Switch */
        .switch { width: 44px; height: 22px; position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        footer { padding: 60px 20px 40px; text-align: center; border-top: 1px solid var(--brd); }
        .footer-sns { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; align-items: center; }
        .x-logo-img { height: 24px; filter: invert(1); }
        body.dark-mode .x-logo-img { filter: invert(0); }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://minyangtech.n-e.kr" class="logo-link">
                <img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/%EB%AF%BC%EC%96%91%20%ED%85%8C%ED%81%AC.png" alt="Logo">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="https://minyangtech.n-e.kr/docs" class="active">Docs</a></li>
                    <li><a href="https://minyangtech.n-e.kr/news">News</a></li>
                    <li><a href="https://minyangtech.n-e.kr/apps">Apps</a></li>
                    <li><a href="https://minyangtech.n-e.kr/issues">Issues</a></li>
                    <li><a href="https://minyangtech.n-e.kr/eula">EULA</a></li>
                </ul>
            </nav>
        </div>
        <div class="controls">
            <label class="switch">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <main class="docs-container">
        <aside class="docs-sidebar" id="sidebar-target"></aside>

        <article class="docs-content">
            <h1>민양테크 Docs</h1>
            <p class="subtitle">민양테크 공식 문서 사이트입니다.</p>
            <hr style="border:0; border-top:1px solid var(--brd); margin: 30px 0;">
            <div class="docs-body">
                <section>
                    <h3 style="color:var(--accent);">소개</h3>
                    <p>민양테크의 다양한 정보를 제공합니다.</p>
                </section>
            </div>
        </article>
    </main>

    <footer>
        <div class="footer-sns">
            <a href="https://x.com/minyangtech" target="_blank"><img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/logo-white.png" class="x-logo-img" alt="X"></a>
            <a href="https://www.youtube.com/@minyangtech" target="_blank"><i class="fa-brands fa-youtube" style="font-size:32px; color:#FF0000;"></i></a>
        </div>
        <div class="footer-copyright">
            <p>Copyright © 2026 민양테크. All rights reserved.</p>
        </div>
    </footer>

    <script>
        async function loadSidebar() {
            const target = document.getElementById('sidebar-target');
            try {
                const response = await fetch('nav.html'); 
                if (!response.ok) throw new Error();
                const data = await response.text();
                target.innerHTML = data;
                const links = target.querySelectorAll('a');
                const currentPath = window.location.pathname;
                links.forEach(link => {
                    if (currentPath.includes(link.getAttribute('href'))) link.classList.add('active');
                });
            } catch (e) {
                target.innerHTML = "<p style='opacity:0.5; padding:20px;'>메뉴를 불러오지 못했습니다.</p>";
            }
        }

        const darkModeToggle = document.getElementById('dark-mode-toggle');
        darkModeToggle.addEventListener('change', () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        });

        window.addEventListener('DOMContentLoaded', () => {
            loadSidebar();
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.body.classList.add('dark-mode');
                darkModeToggle.checked = true;
            }
        });
    </script>
</body>
</html>
