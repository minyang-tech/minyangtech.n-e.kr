<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <link rel="icon" href="https://github.com/minyangtech/minyangtech.github.io/blob/main/image/%EB%AF%BC%EC%96%91%20%ED%85%8C%ED%81%AC.png?raw=true" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Network Privacy | MinyangTech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/assets/css/header-unified.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.1/dist/purify.min.js" integrity="sha384-80VlBZnyAwkkqtSfg5NhPyZff6nU4K/qniLBL8Jnm4KDv6jZhLiYtJbhglg/i9ww" crossorigin="anonymous"></script>
    <script src="/assets/js/security.js"></script>
    <style>
        :root { --accent: #007bff; --txt: #333; --bg: #fff; --brd: #eee; --card-bg: #fff; }
        body.dark-mode { --txt: #f5f5f5; --bg: #121212; --brd: #333; --card-bg: #1e1e1e; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--txt); transition: background-color 0.3s, color 0.3s; margin: 0; }
        header { width: 100%; height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; border-bottom: 1px solid var(--brd); background-color: var(--bg); position: fixed; top: 0; left: 0; z-index: 1000; box-sizing: border-box; }
        .header-left { display: flex; align-items: center; gap: 40px; }
        .logo-link img { height: 40px !important; width: auto !important; display: block; }
        .nav-links { display: flex; list-style: none; gap: 25px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--txt); font-weight: 600; opacity: 0.7; transition: 0.2s; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }
        .nav-links a.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }
        .docs-container { display: flex; max-width: 1400px; margin: 0 auto; min-height: calc(100vh - 160px); padding-top: 80px; }
        .docs-sidebar { width: 280px; padding: 40px 20px; border-right: 1px solid var(--brd); position: sticky; top: 80px; height: fit-content; }
        .docs-sidebar ul { list-style: none !important; padding: 0 !important; margin: 0 !important; }
        .docs-sidebar li { margin-bottom: 8px !important; list-style: none !important; }
        .docs-sidebar a { text-decoration: none; color: var(--txt); opacity: 0.6; transition: 0.3s; font-size: 0.95rem; display: block; }
        .docs-sidebar a:hover, .docs-sidebar a.active { opacity: 1; font-weight: bold; color: var(--accent); }
        .docs-content { flex: 1; padding: 40px 60px; line-height: 1.8; }
        .docs-content h1 { font-size: 2.5rem; margin-bottom: 10px; font-weight: 800; }
        .docs-content .subtitle { font-size: 1.2rem; opacity: 0.6; margin-bottom: 30px; letter-spacing: 1px; }
        .reference-content h1 { font-size: 2rem; margin-top: 42px; }
        .reference-content h2 { font-size: 1.5rem; margin-top: 32px; }
        .reference-content table { width: 100%; border-collapse: collapse; margin: 18px 0 28px; font-size: 0.95rem; }
        .reference-content th, .reference-content td { padding: 12px 14px; border-bottom: 1px solid var(--brd); text-align: left; vertical-align: top; }
        .reference-content th { background: rgba(62, 207, 142, 0.05); color: var(--accent); font-weight: 700; }
        .reference-content code { background: rgba(0, 123, 255, 0.08); padding: 2px 6px; border-radius: 6px; }
        footer { padding: 60px 20px 40px; text-align: center; border-top: 1px solid var(--brd); background-color: var(--bg); }
        .footer-sns { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; align-items: center; }
        .x-logo-img { height: 24px !important; width: auto !important; filter: invert(1); transition: 0.3s; }
        body.dark-mode .x-logo-img { filter: invert(0); }
        .fa-youtube { font-size: 32px !important; color: #FF0000 !important; }
        .footer-email { margin-bottom: 15px; }
        .footer-email a { text-decoration: none; color: var(--txt); opacity: 0.6; font-weight: 500; }
        .footer-copyright { font-size: 0.85rem; opacity: 0.4; }
        .switch { width: 44px; height: 22px; position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }
        @media (max-width: 900px) { .docs-container { flex-direction: column; } .docs-sidebar { width: 100%; border-right: none; border-bottom: 1px solid var(--brd); position: relative; top: 0; } .docs-content { padding: 40px 20px; } }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://minyangtech.n-e.kr" class="logo-link">
                <img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/%EB%AF%BC%EC%96%91%20%ED%85%8C%ED%81%AC.png" alt="Logo">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="/de-de/docs/index.html" class="active">Dokumente</a></li>
                    <li><a href="/de-de/news/index.html">News</a></li>
                    <li><a href="/de-de/apps.html">Apps</a></li>
                    <li><a href="/de-de/portfolio.html">Portfolio</a></li>
                    <li><a href="/de-de/issues.html">Issues</a></li>
                    <li><a href="/de-de/Contributing.html">Contributing</a></li>
                    <li><a href="/de-de/eula.html">EULA</a></li>
                </ul>
            </nav>
        </div>
        <div class="controls">
            <label class="switch">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </header>
    <main class="docs-container">
        <aside class="docs-sidebar" id="sidebar-target"></aside>
        <article class="docs-content">
            <h1>Network Privacy</h1>
            <p class="subtitle">Sicherheits- und Datenschutzleitfaden für Netzwerk-Nodes</p>
            <hr style="border:0; border-top:1px solid var(--brd); margin: 30px 0;">
            <div class="docs-body">
                <div class="reference-content" id="privacy-reference-target"></div>
            </div>
        </article>
    </main>
    <footer>
        <h3 style="margin-bottom:20px;">Kontakt</h3>
        <div class="footer-sns">
            <a href="https://x.com/minyangtech" target="_blank"><img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/logo-white.png" class="x-logo-img" alt="X Logo"></a>
            <a href="https://www.youtube.com/@minyangtech" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        </div>
        <div class="footer-email"><a href="mailto:support@minyangtech.n-e.kr">support@minyangtech.n-e.kr</a></div>
        <div class="footer-copyright"><p>Copyright 2026. MinyangTech. All rights reserved.</p></div>
    </footer>
    <script>
        async function loadSidebar() {
            const target = document.getElementById('sidebar-target');
            try {
                const data = await SiteSecurity.secureFetchText('../nav.html', 'f06c78ee280044610e25162d2cff1c664eb18da5235ab3150419ca1927d6a223');
                SiteSecurity.setSanitizedHtml(target, data);
                const links = target.querySelectorAll('a');
                const currentPath = window.location.pathname;
                links.forEach(link => {
                    const href = link.getAttribute('href');
                    if (href && (currentPath.endsWith(href) || currentPath.includes(href))) {
                        link.classList.add('active');
                    }
                });
            } catch (error) {
                SiteSecurity.appendTextMessage(target, 'Dokument konnte nicht geladen werden.');
            }
        }
        async function loadPrivacyReference() {
            const target = document.getElementById('privacy-reference-target');
            try {
                const markdown = await SiteSecurity.secureFetchText('privacy-policy.md', '0094becf4079052d1cc98a34da81e6b57dd5a6683ddfc0dbc21f117bd4e6ede9');
                SiteSecurity.setMarkdown(target, markdown);
            } catch (error) {
                SiteSecurity.appendTextMessage(target, 'Dokument konnte nicht geladen werden.');
            }
        }
        function toggleDarkMode() {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        }
        document.getElementById('dark-mode-toggle').addEventListener('change', toggleDarkMode);
        window.onload = () => {
            loadSidebar();
            loadPrivacyReference();
            if (localStorage.getItem('darkMode') === 'enabled') {
                document.body.classList.add('dark-mode');
                const toggle = document.getElementById('dark-mode-toggle');
                if (toggle) toggle.checked = true;
            }
        };
    </script>
    <script src="/assets/js/translation-menu.js" defer></script>
</body>
</html>
