<!DOCTYPE html>
<html lang="zh-CN" dir="ltr">
<head>
    <link rel="icon" href="https://github.com/minyangtech/minyangtech.github.io/blob/main/image/%EB%AF%BC%EC%96%91%20%ED%85%8C%ED%81%AC.png?raw=true" type="image/x-icon">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>应用 | MinyangTech</title>
    <meta property="og:title" content="MinyangTech 应用">
    <meta property="og:description" content="查看 MinyangTech 提供的实用应用列表。">
    <meta property="og:image" content="https://github.com/minyang-tech/minyangtech.github.io/blob/main/image%2F%EB%AF%BC%EC%96%91%ED%85%8C%ED%81%AC%20%EB%B0%94%ED%83%95%ED%99%94%EB%A9%B4.png">
    <meta property="og:url" content="https://minyangtech.n-e.kr/apps">
    <meta property="og:type" content="website">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="stylesheet" href="/common.css">
    <link rel="stylesheet" href="/assets/css/header-unified.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" integrity="sha384-948ahk4ZmxYVYOc+rxN1H2gM1EJ2Duhp7uHtZ4WSLkV4Vtx5MUqnV+l7u9B+jFv+" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.1/dist/purify.min.js" integrity="sha384-80VlBZnyAwkkqtSfg5NhPyZff6nU4K/qniLBL8Jnm4KDv6jZhLiYtJbhglg/i9ww" crossorigin="anonymous"></script>
    <script src="/assets/js/security.js"></script>

    <style>
        :root { --accent: #007bff; --txt: #333; --bg: #fff; --brd: #eee; --card-bg: #fff; }
        body.dark-mode { --txt: #f5f5f5; --bg: #121212; --brd: #333; --card-bg: #1e1e1e; }

        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--txt); transition: 0.3s; margin: 0; }

        /* Header */
        header {
            width: 100%; height: 80px; display: flex; justify-content: space-between; align-items: center;
            padding: 0 5%; border-bottom: 1px solid var(--brd); background-color: var(--bg);
            position: fixed; top: 0; left: 0; z-index: 1000; box-sizing: border-box;
        }
        .header-left { display: flex; align-items: center; gap: 40px; }
        .logo-link img { height: 40px !important; width: auto !important; display: block; }
        .nav-links { display: flex; list-style: none; gap: 25px; margin: 0; padding: 0; }
        .nav-links a { text-decoration: none; color: var(--txt); font-weight: 600; opacity: 0.7; transition: 0.2s; }
        .nav-links a:hover { opacity: 1; color: var(--accent); }
        .nav-links a.active { opacity: 1; color: var(--accent); border-bottom: 2px solid var(--accent); }

        /* Filter UI */
        .filter-container {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 30px; gap: 15px; flex-wrap: wrap;
        }
        .search-box { position: relative; flex: 1; min-width: 250px; }
        .search-box i { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); opacity: 0.5; }
        .search-box input {
            width: 100%; padding: 12px 15px 12px 40px; border-radius: 12px;
            border: 1px solid var(--brd); background: var(--card-bg);
            color: var(--txt); font-size: 0.95rem; outline: none; transition: 0.2s;
            box-sizing: border-box;
        }
        .search-box input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,123,255,0.1); }
        .sort-select {
            padding: 12px 15px; border-radius: 12px; border: 1px solid var(--brd);
            background: var(--card-bg); color: var(--txt); outline: none; cursor: pointer; font-weight: 600;
        }

        /* Main Container */
        .app-container { max-width: 1100px; margin: 0 auto; min-height: calc(100vh - 160px); padding: 130px 20px 60px; }
        .page-header { text-align: center; margin-bottom: 40px; }
        .page-header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }

        /* List UI */
        .app-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        .app-card {
            background: var(--card-bg); border: 1px solid var(--brd); border-radius: 20px;
            overflow: hidden; transition: 0.3s; cursor: pointer; display: flex; flex-direction: column;
        }
        .app-card:hover { transform: translateY(-7px); border-color: var(--accent); box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .app-card-img { width: 100%; height: 200px; background-size: cover; background-position: center; }
        .app-card-info { padding: 25px; flex: 1; }
        .app-card-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; }
        .app-card-tag { font-size: 0.8rem; background: rgba(0,123,255,0.1); color: var(--accent); padding: 4px 10px; border-radius: 20px; font-weight: 600; }

        /* Detail View */
        #post-view { display: none; }
        .post-back { display: inline-block; margin-bottom: 25px; text-decoration: none; color: var(--accent); font-weight: 600; cursor: pointer; }

        .app-detail-wrapper { display: flex; gap: 40px; margin-top: 20px; flex-wrap: wrap; }
        .app-detail-left { flex: 1; min-width: 300px; }
        .app-detail-right { flex: 1; min-width: 300px; }

        .app-main-img { width: 100%; border-radius: 20px; border: 1px solid var(--brd); }
        .app-screenshot-gallery { margin-top: 24px; }
        .app-screenshot-gallery h2 { font-size: 1.15rem; margin: 0 0 14px; }
        .app-screenshot-grid { display: grid; gap: 14px; }
        .app-screenshot-grid img {
            width: 100%;
            border-radius: 16px;
            border: 1px solid var(--brd);
            background: var(--card-bg);
            object-fit: cover;
        }
        .app-spec-table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        .app-spec-table th, .app-spec-table td { padding: 12px; border-bottom: 1px solid var(--brd); text-align: left; }
        .app-spec-table th { font-weight: 700; opacity: 0.6; width: 120px; }

        .download-btn {
            display: block; width: 100%; padding: 18px; background: var(--accent); color: #fff;
            text-align: center; border-radius: 12px; font-weight: 800; font-size: 1.1rem;
            text-decoration: none; transition: 0.3s; margin-top: 20px;
        }
        .download-btn:hover { filter: brightness(1.1); transform: scale(1.02); }

        /* Dark Mode Toggle */
        .switch { width: 44px; height: 22px; position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        footer {
            width: 100%; padding: 50px 20px; border-top: 1px solid var(--brd); background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center; text-align: center; box-sizing: border-box;
        }
        .x-logo-img { height: 24px !important; filter: invert(1); transition: 0.3s; }
        body.dark-mode .x-logo-img { filter: invert(0); }
        .fa-youtube { font-size: 32px !important; color: #FF0000 !important; }

        @media (max-width: 768px) {
            .app-detail-wrapper { flex-direction: column; }
            .filter-container { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-left">
            <a href="https://minyangtech.n-e.kr" class="logo-link">
                <img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/%EB%AF%BC%EC%96%91%20%ED%85%8C%ED%81%AC.png" alt="Logo">
            </a>
            <nav>
                <ul class="nav-links">
                    <li><a href="/zh-cn/docs/index.html">文档</a></li>
                    <li><a href="/zh-cn/news/index.html">新闻</a></li>
                    <li><a href="/zh-cn/apps.html" class="active">应用</a></li>
                    <li><a href="/zh-cn/Find.html">招募</a></li>
                    <li><a href="/zh-cn/portfolio.html">作品集</a></li>
                    <li><a href="/zh-cn/issues.html">问题</a></li>
                    <li><a href="/zh-cn/Contributing.html">Contributing</a></li>
                    <li><a href="/zh-cn/eula.html">EULA</a></li>
                </ul>
            </nav>
        </div>
        <div class="controls">
            <label class="switch">
                <input type="checkbox" id="dark-mode-toggle">
                <span class="slider"></span>
            </label>
        </div>
    </header>

    <main class="app-container">
        <div id="list-ui">
            <section class="page-header">
                <h1>应用</h1>
                <p>查看 MinyangTech 提供的实用应用列表。</p>
            </section>

            <div class="filter-container">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="app-search" placeholder="搜索应用名称或说明...">
                </div>
                <select id="app-sort" class="sort-select">
                    <option value="newest">最新</option>
                    <option value="oldest">最早</option>
                </select>
            </div>

            <div class="app-list" id="app-feed"></div>
        </div>

        <div id="post-view">
            <a onclick="closeApp()" class="post-back"><i class="fa-solid fa-arrow-left"></i> 返回列表</a>
            <div id="post-body"></div>
        </div>
    </main>

    <footer>
        <div class="footer-sns" style="display: flex; gap: 30px; margin-bottom: 25px; align-items: center;">
            <a href="https://x.com/minyang_tech" target="_blank">
                <img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/logo-white.png" class="x-logo-img" alt="X">
            </a>
            <a href="https://www.youtube.com/@minyangtech" target="_blank">
                <i class="fa-brands fa-youtube"></i>
            </a>
        </div>
        <div class="footer-email">
            <a href="mailto:support@minyangtech.n-e.kr" style="text-decoration:none; color:var(--txt); opacity:0.6;">support@minyangtech.n-e.kr</a>
        </div>
        <div class="footer-copyright" style="font-size:13px; opacity:0.4; margin-top:15px;">
            <p>Copyright 2026. MinyangTech. All rights reserved.</p>
        </div>
    </footer>

    <script>
        let appData = [];
        const toggle = document.getElementById('dark-mode-toggle');
        const searchInput = document.getElementById('app-search');
        const sortSelect = document.getElementById('app-sort');

        function updateTheme(isDark) {
            document.body.classList.toggle('dark-mode', isDark);
            toggle.checked = isDark;
            localStorage.setItem('darkMode', isDark ? 'enabled' : 'disabled');
        }
        toggle.addEventListener('change', () => updateTheme(toggle.checked));

        async function fetchApps() {
            try {
                appData = await SiteSecurity.secureFetchJson('apps-data.json', '3e33d656b1cfb92869a973ef8ac3b6d56500ffc9adf21a75095ccf723fee34b0');
                checkUrlParam();
            } catch (error) {
                console.error("Load Error:", error);
                SiteSecurity.appendTextMessage(document.getElementById('app-feed'), '无法加载数据。');
            }
        }

        function checkUrlParam() {
            const params = new URLSearchParams(window.location.search);
            const appId = params.get('id');
            if (appId) { showApp(appId); } else { showList(); }
        }

        function showList() {
            document.getElementById('list-ui').style.display = 'block';
            document.getElementById('post-view').style.display = 'none';
            applyFilterAndSort(); // Filter logic applied here
        }

        // Filter and Sort Logic added
        function applyFilterAndSort() {
            const searchTerm = searchInput.value.toLowerCase();
            const sortOrder = sortSelect.value;

            let filtered = appData.filter(app =>
                app.name.toLowerCase().includes(searchTerm) ||
                app.short_desc.toLowerCase().includes(searchTerm) ||
                app.category.toLowerCase().includes(searchTerm)
            );

            filtered.sort((a, b) => sortOrder === 'newest' ? b.id - a.id : a.id - b.id);
            renderAppList(filtered);
        }

        function renderAppList(data) {
            const feed = document.getElementById('app-feed');
            feed.replaceChildren();
            if (!data.length) {
                SiteSecurity.appendTextMessage(feed, '没有搜索结果。');
                return;
            }

            data.forEach(app => {
                const card = document.createElement('div');
                card.className = 'app-card';
                card.addEventListener('click', () => showApp(app.id));
                const image = document.createElement('div');
                image.className = 'app-card-img';
                image.style.backgroundImage = `url("${SiteSecurity.safeUrl(app.image)}")`;
                const info = document.createElement('div');
                info.className = 'app-card-info';
                const tag = document.createElement('span');
                tag.className = 'app-card-tag';
                tag.textContent = app.category || '';
                const title = document.createElement('h2');
                title.className = 'app-card-title';
                title.textContent = app.name || '';
                const desc = document.createElement('p');
                desc.style.cssText = 'opacity:0.7; font-size:0.9rem;';
                desc.textContent = app.short_desc || '';
                info.append(tag, title, desc);
                card.append(image, info);
                feed.appendChild(card);
            });
        }

        function showApp(id) {
            const app = appData.find(a => a.id == id);
            if (!app) return;

            document.getElementById('list-ui').style.display = 'none';
            document.getElementById('post-view').style.display = 'block';
            window.scrollTo(0,0);

            const body = document.getElementById('post-body');
            body.replaceChildren();
            const top = document.createElement('div');
            top.style.cssText = 'display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;';
            const title = document.createElement('h1');
            title.style.cssText = 'font-size:2.5rem; margin:0;';
            title.textContent = app.name || '';
            const share = document.createElement('button');
            share.type = 'button';
            share.style.cssText = 'border:none; background:var(--accent); color:#fff; padding:12px 16px; border-radius:12px; cursor:pointer;';
            share.addEventListener('click', shareApp);
            const shareIcon = document.createElement('i');
            shareIcon.className = 'fa-solid fa-share';
            share.appendChild(shareIcon);
            top.append(title, share);
            const wrapper = document.createElement('div');
            wrapper.className = 'app-detail-wrapper';
            const left = document.createElement('div');
            left.className = 'app-detail-left';
            const image = document.createElement('img');
            image.className = 'app-main-img';
            image.src = SiteSecurity.safeUrl(app.image);
            const markdown = document.createElement('div');
            markdown.style.marginTop = '20px';
            SiteSecurity.setMarkdown(markdown, app.description || '');
            left.append(image, markdown);
            if (Array.isArray(app.screenshots) && app.screenshots.length) {
                const gallery = document.createElement('div');
                gallery.className = 'app-screenshot-gallery';
                const galleryTitle = document.createElement('h2');
                galleryTitle.textContent = 'Screenshots';
                const galleryGrid = document.createElement('div');
                galleryGrid.className = 'app-screenshot-grid';
                app.screenshots.forEach((src, index) => {
                    const safeSrc = SiteSecurity.safeUrl(src);
                    if (!safeSrc) return;
                    const shot = document.createElement('img');
                    shot.src = safeSrc;
                    shot.alt = `${app.name || 'App'} screenshot ${index + 1}`;
                    galleryGrid.appendChild(shot);
                });
                if (galleryGrid.children.length) {
                    gallery.append(galleryTitle, galleryGrid);
                    left.appendChild(gallery);
                }
            }
            const right = document.createElement('div');
            right.className = 'app-detail-right';
            const table = document.createElement('table');
            table.className = 'app-spec-table';
            [
                ['출시일', app.release_date],
                ['平台', app.platform],
                ['最低配置', app.min_spec],
                ['推荐配置', app.rec_spec],
                ['开源', app.is_opensource ? '公开' : '不公开']
            ].forEach(([label, value]) => {
                const row = table.insertRow();
                const th = document.createElement('th');
                th.textContent = label;
                const td = document.createElement('td');
                td.textContent = value || '';
                row.append(th, td);
            });
            if (SiteSecurity.safeUrl(app.source_url)) {
                const row = table.insertRow();
                const th = document.createElement('th');
                th.textContent = '源代码';
                const td = document.createElement('td');
                const link = document.createElement('a');
                link.href = SiteSecurity.safeUrl(app.source_url);
                link.target = '_blank';
                link.rel = 'noopener';
                link.style.color = 'var(--accent)';
                link.textContent = 'GitHub 바로가기';
                td.appendChild(link);
                row.append(th, td);
            }
            const download = document.createElement('a');
            download.className = 'download-btn';
            download.target = '_blank';
            download.rel = 'noopener';
            download.href = SiteSecurity.safeUrl(app.download_url);
            download.textContent = '下载';
            right.append(table, download);
            if (app.is_ai) {
                const notice = document.createElement('div');
                notice.style.cssText = 'margin-top:20px; padding:15px; background:rgba(0, 123, 255, 0.05); border-radius:12px; border-left:4px solid var(--accent); font-size:0.85rem; line-height:1.6; opacity:0.8;';
                notice.textContent = '본 애플리케이션은 「인공지능 산업 육성 및 신뢰 기반 조성 등에 관한 기본법」에 의거하여, 제작 과정에서 AI 기술이 활용되었음을 밝힙니다.';
                right.appendChild(notice);
            }
            wrapper.append(left, right);
            body.append(top, wrapper);
            if(!window.location.search.includes(`id=${id}`)) {
                history.pushState(null, '', `?id=${id}`);
            }
        }

        function closeApp() {
            history.pushState(null, '', window.location.pathname);
            showList();
        }

        function shareApp() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({ title: document.title, url: url });
            } else {
                navigator.clipboard.writeText(url);
                alert("링크가 복사되었습니다!");
            }
        }

        window.onpopstate = () => checkUrlParam();

        // Listeners for filter and sort
        searchInput.addEventListener('input', applyFilterAndSort);
        sortSelect.addEventListener('change', applyFilterAndSort);

        window.onload = () => {
            if (localStorage.getItem('darkMode') === 'enabled') updateTheme(true);
            fetchApps();
        };
    </script>
    <script src="/assets/js/translation-menu.js" defer></script>
</body>
</html>
