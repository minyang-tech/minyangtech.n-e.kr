<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Policy | MinyangTech</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha384-iw3OoTErCYJJB9mCa8LNS2hbsQ7M3C0EpIsO/H5+EGAkPGc6rk+V8i04oW/K5xq0" crossorigin="anonymous">
    <link rel="stylesheet" href="/assets/css/header-shared.css">
    <meta property="og:title" content="민양테크">
    <meta property="og:description" content="Policy For DiscordBot">
    <meta property="og:image" content="https://github.com/minyang-tech/minyangtech.github.io/blob/main/image%2F%EB%AF%BC%EC%96%91%ED%85%8C%ED%81%AC%20%EB%B0%94%ED%83%95%ED%99%94%EB%A9%B4.png">
    <meta property="og:url" content="https://minyangtech.n-e.kr/g/invite1.html">
    <meta property="og:type" content="website">
    <style>
        :root { --accent: #007bff; --txt: #333; --bg: #fff; --brd: #eee; --card: #f9f9f9; }
        body.dark-mode { --txt: #f5f5f5; --bg: #121212; --brd: #333; --card: #1e1e1e; }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Pretendard', sans-serif; background-color: var(--bg); color: var(--txt); transition: 0.3s; line-height: 1.6; }

        header { width: 100%; height: 80px; display: flex; justify-content: space-between; align-items: center; padding: 0 5%; border-bottom: 1px solid var(--brd); }
        .logo-link img { height: 40px; }

        .switch { width: 44px; height: 22px; position: relative; display: inline-block; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 20px; transition: 0.3s; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
        input:checked + .slider { background: var(--accent); }
        input:checked + .slider:before { transform: translateX(22px); }

        main { max-width: 800px; margin: 60px auto; padding: 0 20px; text-align: center; }
        .policy-card { background: var(--card); border: 1px solid var(--brd); padding: 40px; border-radius: 20px; text-align: left; margin-bottom: 40px; }
        .policy-card h2 { margin-bottom: 20px; color: var(--accent); }
        .policy-card h4 { margin: 20px 0 10px; }
        .policy-card p, .policy-card li { font-size: 15px; opacity: 0.8; }
        .policy-card ul { padding-left: 20px; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .invite-btn { background: var(--accent); color: #fff; padding: 18px 60px; border-radius: 50px; text-decoration: none; font-weight: 700; font-size: 18px; transition: 0.2s; box-shadow: 0 4px 15px rgba(0,123,255,0.2); }
        .invite-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,123,255,0.4); }
        .home-link { text-decoration: none; color: var(--txt); opacity: 0.5; font-size: 14px; }

        footer { padding: 50px 20px; border-top: 1px solid var(--brd); text-align: center; }
        .x-logo-img { height: 24px; filter: invert(1); transition: 0.3s; }
        body.dark-mode .x-logo-img { filter: invert(0); }
        .fa-youtube { font-size: 32px; color: #FF0000; margin-left: 20px; }
    </style>
</head>
<body>
    <header>
        <a href="https://minyangtech.n-e.kr" class="logo-link">
            <img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/%EB%AF%BC%EC%96%91%20%ED%85%8C%ED%81%AC.png" alt="Logo">
        </a>
        <label class="switch">
            <input type="checkbox" id="dark-mode-toggle">
            <span class="slider"></span>
        </label>
    </header>

    <main>
        <div class="policy-card">
            <h2>본 봇은 어떠한 사용자 데이터도 수집하거나 저장하지 않습니다.</h2>
            <p>원래 없어도 되는 페이지이지만 디스코드 개발자 페이지에 policy 칸 입력해야해서 만들었습니다 ♥️♥️</p>
        </div>

        <div class="btn-group">
            <a href="https://minyangtech.n-e.kr/g/invite1" class="invite-btn">
                <i class="fa-brands fa-discord"></i> Discord
            </a>
            <a href="https://minyangtech.n-e.kr" class="home-link">다운로드 받기/a>
        </div>
    </main>

    <footer>
        <div style="margin-bottom: 20px;">
            <a href="https://x.com/minyangtech" target="_blank"><img src="https://raw.githubusercontent.com/minyangtech/minyangtech.github.io/main/image/logo-white.png" class="x-logo-img"></a>
            <a href="https://www.youtube.com/@minyangtech" target="_blank"><i class="fa-brands fa-youtube"></i></a>
        </div>
        <p style="font-size: 13px; opacity: 0.4;">Copyright © 2026 Minyang Tech. All rights reserved.</p>
    </footer>

    <script>
        const toggle = document.getElementById('dark-mode-toggle');
        function updateTheme(isDark) {
            if (isDark) {
                document.body.classList.add('dark-mode');
                toggle.checked = true;
                localStorage.setItem('darkMode', 'enabled');
            } else {
                document.body.classList.remove('dark-mode');
                toggle.checked = false;
                localStorage.setItem('darkMode', 'disabled');
            }
        }
        toggle.addEventListener('change', () => updateTheme(toggle.checked));
        window.addEventListener('DOMContentLoaded', () => {
            const savedMode = localStorage.getItem('darkMode');
            if (savedMode === 'enabled' || (!savedMode && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                updateTheme(true);
            }
        });
    </script>
    <script src="/assets/js/translation-menu.js" defer></script>
</body>
</html>
